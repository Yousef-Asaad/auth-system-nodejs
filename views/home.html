<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <nav>

        <div class="logo">
            Dashboard
        </div>

        <div class="links">
            <a href="/home">Home</a>
            <a href="/logout">Logout</a>
        </div>

    </nav>

    <div class="container home-box">

        <h1>Welcome Back, <span id="username">

        <p>Your authentication system is working successfully.</p>

    </div>

    <script>
        fetch('/user')
            .then(res => res.json())
            .then(data => {
                document.getElementById('username').textContent = data.username;
            });
    </script>

</body>

</html>
