<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a href="/">Login</a>
  <a href="/register">Register</a>
</nav>

<div class="container">

  <h1>Register</h1>

  <form action="/auth/register" method="POST">

    <input
      type="text"
      name="username"
      placeholder="Enter Username"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Enter Email"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Enter Password"
      required
    >

    <button type="submit">Register</button>

  </form>

</div>

</body>
</html>
